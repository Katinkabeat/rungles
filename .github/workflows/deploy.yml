name: Deploy Rungles to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deploy at a time, queueing if needed.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Clone the SideQuest hub repo as a sibling so Rungles' build can
      # resolve `../rae-side-quest/packages/sq-ui/...` imports. The shared
      # design-system package lives there. See feedback_sq_monorepo_migration.md
      # for why this is a clone-step instead of a real monorepo right now.
      - name: Clone rae-side-quest (for shared sq-ui package)
        run: git clone --depth 1 https://github.com/Katinkabeat/games.git ../rae-side-quest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
